name: graphql-release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev|stage|prod)"
        required: true
        default: "dev"
      image_tag:
        description: "Image tag (optional; defaults to commit sha if empty)"
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      TF_IN_AUTOMATION: true
      ACR_NAME: ${{ vars.ACR_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Build and push image
        shell: bash
        run: |
          set -euo pipefail
          : "${ACR_NAME}"
          TAG="${{ github.event.inputs.image_tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="${GITHUB_SHA::12}"
          fi

          IMAGE_URI="${ACR_NAME}.azurecr.io/msk-graphql:${TAG}"

          az acr login -n "${ACR_NAME}"
          docker build -t "$IMAGE_URI" runtime/graphql
          docker push "$IMAGE_URI"

          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Generate Terraform config files from environment vars
        shell: bash
        run: |
          set -euo pipefail

          TARGET_ENV="${{ github.event.inputs.environment }}"
          mkdir -p "env/${TARGET_ENV}"

          : "${{ vars.TF_BACKEND_RESOURCE_GROUP }}"
          : "${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}"
          : "${{ vars.TF_BACKEND_CONTAINER }}"
          : "${{ vars.TF_BACKEND_KEY }}"
          : "${{ vars.TF_ORG }}"
          : "${{ vars.TF_LOCATION }}"

          cat > "env/${TARGET_ENV}/backend.hcl" <<EOF
          resource_group_name  = "${{ vars.TF_BACKEND_RESOURCE_GROUP }}"
          storage_account_name = "${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}"
          container_name       = "${{ vars.TF_BACKEND_CONTAINER }}"
          key                  = "${{ vars.TF_BACKEND_KEY }}"
          EOF

          cat > "env/${TARGET_ENV}/${TARGET_ENV}.tfvars" <<EOF
          org      = "${{ vars.TF_ORG }}"
          env      = "${TARGET_ENV}"
          location = "${{ vars.TF_LOCATION }}"
          graphql_container_image = "${IMAGE_URI}"
          EOF

      - name: Terraform deploy
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/iac.sh
          ./scripts/iac.sh "${{ github.event.inputs.environment }}" infra
