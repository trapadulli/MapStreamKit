name: graphql-release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev|stage|prod)"
        required: true
        default: "dev"
      acr_name:
        description: "Azure Container Registry name (without .azurecr.io)"
        required: true
      image_tag:
        description: "Image tag (optional; defaults to commit sha if empty)"
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Build and push image
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.image_tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="${GITHUB_SHA::12}"
          fi

          IMAGE_URI="${{ github.event.inputs.acr_name }}.azurecr.io/msk-graphql:${TAG}"

          az acr login -n "${{ github.event.inputs.acr_name }}"
          docker build -t "$IMAGE_URI" runtime/graphql
          docker push "$IMAGE_URI"

          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Terraform deploy
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/iac.sh
          TF_VAR_graphql_container_image="$IMAGE_URI" ./scripts/iac.sh "${{ github.event.inputs.environment }}" infra
